on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - run: npm ci
    - run: npm run build # Збирає проєкт та створює папку .next/standalone

    # Копіюємо необхідну статику в автономну папку перед відправкою
    - run: cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static


    - name: rsync deploy
      uses: burnett01/rsync-deployments@v8
      with:
        switches: -avzr --delete --exclude='.git*' --exclude='.env'
        path: .next/standalone/ 
        remote_host: ${{ secrets.REMOTE_HOST }}
        remote_user: ${{ secrets.REMOTE_USER }}
        remote_key: ${{ secrets.REMOTE_KEY }}
        remote_path: ${{ secrets.REMOTE_PATH }}
#       remote_key_pass: ${{ secrets.REMOTE_KEY_PASS }}

    - name: Restart Node Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ${{ secrets.TARGET_DIR }}
          # На хостингу Україна управління процесами Node відбувається через їхню панель або команду supervisor/passenger
          # Зазвичай достатньо "торкнути" файл перезапуску, який зчитує веб-сервер:
          touch tmp/restart.txt || pkill -f "node server.js" || true